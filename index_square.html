<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin:0;
            height:100vh;
            background-color: tomato;
             justify-content: center;
            align-items: center;
            display:flex;
        }
        #container {
            background-color: bisque;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction:column;
            border: 3px solid black;
            gap: 30px;
            
        }
        .box {
            width: 50px;
            height: 50px;
            background-color: blue; 
            border: 3px solid white;
        
        }
        .box2 {
            width: 150px;
            height: 50px;
            background-color: blue;
            border: 3px dashed white;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box"></div>
        <div class="box2"></div>
        <div class="box"></div>
    </div>
    
</body>
</html>

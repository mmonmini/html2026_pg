<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: antiquewhite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            font-size: 38px;
            font-weight: bold;
            padding: 40px 0px;
            }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .color {
            position: relative;
            width: 300px;
            height: 400px;
            border: 7px solid white;
            
        }
         .row:first-of-type {
            margin-bottom: 25px;
         }

        .row:first-of-type .color:first-child {
        background-color: #ff6347;
        }

        .row:first-of-type .color:last-child {
        background-color: #008080;
        }

        .row:last-of-type .color:first-child {
        background-color: #deb887;
        }

        .row:last-of-type .color:last-child {
        background-color: #d7bfd7;
        }
        .color-inf {
            position: absolute;
            margin-top: 15px;
            height: 90px;
            width: 300px;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            font-weight: 500;
        }
        .color-name {
        margin: 11px;
        display: block;
        font-size: 20px;
        margin-bottom: 0px;
        }
        .color-code {
        margin: 11px;
        display: block;
        font-size: 20px;
        margin-bottom: 0px;
        }
    </style>
</head>
<body>
      <h1>The Best Colors</h1>
<div class="row">
    <div class="color">
        <div class="color-inf">
            <p class="color-name">Tomato</p>
            <p class="color-code">#FF6347</p>
            </div>
    </div>
    <div class="color">
        <div class="color-inf">
            <p class="color-name">Teal</p>
            <p class="color-code">#008080</p>
        </div>
    </div>
</div>
<div class="row">
    <div class="color">
        <div class="color-inf">
            <p class="color-name">Burlywood</p>
            <p class="color-code">#DEB887</p>
        </div>
    </div>
    <div class="color">
        <div class="color-inf">
            <p class="color-name">Thistle</p>
            <p class="color-code">#D7BFD7</p>
        </div>
    </div>
</div>
</body>
</html>
